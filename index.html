<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agora</title>
  <meta name="description" content="Dead minds. Live questions. Two philosophers debate today's dilemmas every day.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="philo-modal-overlay" id="philo-modal-overlay">
    <div class="philo-modal" id="philo-modal">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <div class="panel-overlay" id="panel-overlay"></div>
  <aside class="episode-panel" id="episode-panel">
    <div class="panel-header">
      <span class="panel-title">모든 에피소드</span>
      <button class="panel-close" id="panel-close">✕</button>
    </div>
    <div class="panel-list" id="panel-list">
      <div class="loading">불러오는 중...</div>
    </div>
  </aside>

  <header class="chat-header">
    <button class="menu-btn" id="ep-list-btn" aria-label="에피소드 목록">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="2" y="5" width="16" height="1.8" rx="0.9" fill="currentColor"/>
        <rect x="2" y="9.1" width="16" height="1.8" rx="0.9" fill="currentColor"/>
        <rect x="2" y="13.2" width="16" height="1.8" rx="0.9" fill="currentColor"/>
      </svg>
    </button>
    <div class="chat-header-info">
      <div class="chat-header-names" id="chat-header-names">&nbsp;</div>
      <div class="chat-header-topic" id="chat-header-topic">&nbsp;</div>
    </div>
    <div class="chat-header-avatars" id="chat-header-avatars"></div>
    <div class="lang-switcher" id="lang-switcher">
      <button class="lang-btn" data-lang="ko">KO</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="zh">中</button>
      <button class="lang-btn" data-lang="ja">日</button>
    </div>
    <button class="theme-btn" id="theme-btn" aria-label="다크모드 토글">
      <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </header>

  <main id="main-content">
    <div id="loading-state">
      <p class="loading">불러오는 중...</p>
    </div>
    <div id="episode-content" style="display:none">
      <div class="dilemma-bar" id="dilemma-bar"></div>
      <div class="chat-messages" id="chat-messages"></div>
      <div id="summary-wrap"></div>
    </div>
  </main>

  <footer class="site-footer">
    <p>Agora &mdash; Dead minds. Live questions.</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
